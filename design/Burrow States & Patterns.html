<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burrow — States & Patterns Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ECEAE5; font-family: 'Inter', sans-serif; }

    @keyframes burrow-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes burrow-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes burrow-shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
const T = {
  light: {
    bgBase:        '#FAF8F5',
    surface:       '#FFFFFF',
    border:        '#EDE8E0',
    textPrimary:   '#1A1A1A',
    textSecondary: '#6B6B6B',
    textTertiary:  '#A8A29A',
    accent:        '#1A5F5A',
    accentHover:   '#134543',
    verified:      '#2D7A4F',
    warning:       '#C5573D',
    focusRing:     'rgba(26,95,90,0.30)',
    accentTint:    'rgba(26,95,90,0.05)',
    verifiedTint:  'rgba(45,122,79,0.08)',
    warningTint:   'rgba(197,87,61,0.08)',
    infoTint:      'rgba(26,95,90,0.08)',
    skeletonBase:  '#EDE8E0',
    skeletonShine: '#F5F1EA',
  },
  dark: {
    bgBase:        '#14211F',
    surface:       '#1B2A28',
    border:        '#2A3936',
    textPrimary:   '#F5F1EA',
    textSecondary: '#B5AEA3',
    textTertiary:  '#6F6862',
    accent:        '#5BA89E',
    accentHover:   '#7AC0B6',
    verified:      '#5BA876',
    warning:       '#D87A60',
    focusRing:     'rgba(91,168,158,0.35)',
    accentTint:    'rgba(91,168,158,0.07)',
    verifiedTint:  'rgba(91,184,118,0.10)',
    warningTint:   'rgba(216,122,96,0.10)',
    infoTint:      'rgba(91,168,158,0.10)',
    skeletonBase:  '#2A3936',
    skeletonShine: '#1B2A28',
  },
};

/* ═══════════════════════════════════════
   SHARED PRIMITIVES
═══════════════════════════════════════ */

/* Spinner SVG */
function Spinner({ size = 18, color = '#FAF8F5', strokeWidth = 2 }) {
  return (
    <svg
      width={size} height={size} viewBox="0 0 18 18" fill="none"
      style={{ animation: 'burrow-spin 0.8s linear infinite', flexShrink: 0 }}
    >
      <circle cx="9" cy="9" r="7" stroke={color} strokeWidth={strokeWidth} strokeOpacity="0.25" />
      <path d="M9 2 A7 7 0 0 1 16 9" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" />
    </svg>
  );
}

/* Warning icon */
function WarnIcon({ size = 14, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 14 14" fill="none" style={{ flexShrink: 0 }}>
      <circle cx="7" cy="7" r="6.5" stroke={color} strokeWidth="1.2" />
      <path d="M7 4.5v3.2" stroke={color} strokeWidth="1.4" strokeLinecap="round" />
      <circle cx="7" cy="10" r="0.8" fill={color} />
    </svg>
  );
}

/* Check icon */
function CheckIcon({ size = 48, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="24" fill={color} fillOpacity="0.12" />
      <circle cx="24" cy="24" r="18" fill={color} fillOpacity="0.18" />
      <polyline
        points="14,24.5 21,31.5 34,17"
        stroke={color} strokeWidth="2.5"
        strokeLinecap="round" strokeLinejoin="round"
        fill="none"
      />
    </svg>
  );
}

/* Close icon */
function CloseIcon({ size = 18, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 18 18" fill="none">
      <path d="M4.5 4.5L13.5 13.5M13.5 4.5L4.5 13.5" stroke={color} strokeWidth="1.5" strokeLinecap="round" />
    </svg>
  );
}

/* Input field */
function InputBase({ label, placeholder, mode, error, loading, value = '', onChange }) {
  const tk = T[mode];
  const borderColor = error ? tk.warning : tk.border;
  const borderWidth = error ? 2 : 1;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {label && (
        <label style={{ fontSize: 14, color: tk.textSecondary, fontFamily: "'Inter', sans-serif" }}>
          {label}
        </label>
      )}
      <div style={{ position: 'relative' }}>
        <input
          type="text"
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          style={{
            width: '100%',
            height: 56,
            background: tk.surface,
            border: `${borderWidth}px solid ${borderColor}`,
            borderRadius: 12,
            padding: '0 44px 0 16px',
            fontSize: 16,
            fontFamily: "'Inter', sans-serif",
            color: tk.textPrimary,
            outline: 'none',
          }}
        />
        {loading && (
          <div style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)' }}>
            <Spinner size={18} color={tk.accent} strokeWidth={2} />
          </div>
        )}
      </div>
    </div>
  );
}

/* Primary button */
function PrimaryBtn({ children, mode, disabled, loading, onClick, color }) {
  const tk = T[mode];
  const bg = color || (disabled ? (mode === 'dark' ? '#2A3936' : '#D4CEC8') : tk.accent);
  const textColor = disabled
    ? tk.textTertiary
    : color
      ? '#FAF8F5'
      : mode === 'dark' ? tk.bgBase : '#FAF8F5';
  return (
    <button
      disabled={disabled}
      onClick={onClick}
      style={{
        width: '100%', height: 52,
        background: bg,
        color: textColor,
        border: 'none',
        borderRadius: 12,
        fontSize: 16,
        fontFamily: "'Inter', sans-serif",
        fontWeight: 500,
        cursor: disabled ? 'not-allowed' : 'pointer',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        gap: 8,
      }}
    >
      {loading ? <Spinner size={18} color={textColor} /> : children}
    </button>
  );
}

/* Secondary button */
function SecondaryBtn({ children, mode, onClick, color }) {
  const tk = T[mode];
  const c = color || tk.accent;
  return (
    <button
      onClick={onClick}
      style={{
        width: '100%', height: 52,
        background: 'transparent',
        color: c,
        border: `1px solid ${c}`,
        borderRadius: 12,
        fontSize: 16,
        fontFamily: "'Inter', sans-serif",
        fontWeight: 500,
        cursor: 'pointer',
      }}
    >{children}</button>
  );
}

/* Fraunces heading */
function FHead({ children, mode, size = 22, style: extra }) {
  return (
    <h2 style={{
      fontFamily: "'Fraunces', serif",
      fontWeight: 500,
      fontSize: size,
      letterSpacing: '-0.02em',
      color: T[mode].textPrimary,
      lineHeight: 1.25,
      ...extra,
    }}>{children}</h2>
  );
}

/* Pattern card shell */
function PatternCard({ mode, children, minHeight, style: extra }) {
  const tk = T[mode];
  return (
    <div style={{
      width: '100%',
      minHeight: minHeight || 'auto',
      background: tk.bgBase,
      borderRadius: 4,
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      padding: 32,
      ...extra,
    }}>
      {children}
    </div>
  );
}

/* ═══════════════════════════════════════
   PATTERN 1 — INPUT VALIDATION ERROR
═══════════════════════════════════════ */
function P01_InputError({ mode }) {
  const tk = T[mode];
  return (
    <PatternCard mode={mode} minHeight={180}>
      <div style={{ width: '100%', maxWidth: 342, display: 'flex', flexDirection: 'column', gap: 8 }}>
        <label style={{ fontSize: 14, color: tk.textSecondary, fontFamily: "'Inter', sans-serif" }}>
          Work email
        </label>
        <input
          type="text"
          defaultValue="rahul.sharma@gmail.com"
          readOnly
          style={{
            height: 56,
            background: tk.surface,
            border: `2px solid ${tk.warning}`,
            borderRadius: 12,
            padding: '0 16px',
            fontSize: 16,
            fontFamily: "'Inter', sans-serif",
            color: tk.textPrimary,
            outline: 'none',
            boxShadow: `0 0 0 4px ${tk.warning}22`,
          }}
        />
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <WarnIcon size={13} color={tk.warning} />
          <span style={{ fontSize: 12, color: tk.warning, fontFamily: "'Inter', sans-serif", lineHeight: 1.4 }}>
            This email isn't recognized. Try your work email.
          </span>
        </div>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 2 — INPUT INLINE LOADING
═══════════════════════════════════════ */
function P02_InputLoading({ mode }) {
  const tk = T[mode];
  return (
    <PatternCard mode={mode} minHeight={180}>
      <div style={{ width: '100%', maxWidth: 342, display: 'flex', flexDirection: 'column', gap: 8 }}>
        <label style={{ fontSize: 14, color: tk.textSecondary, fontFamily: "'Inter', sans-serif" }}>
          Work email
        </label>
        <div style={{ position: 'relative' }}>
          <input
            type="text"
            defaultValue="priya@deloitte.com"
            readOnly
            style={{
              width: '100%',
              height: 56,
              background: tk.surface,
              border: `1px solid ${tk.border}`,
              borderRadius: 12,
              padding: '0 48px 0 16px',
              fontSize: 16,
              fontFamily: "'Inter', sans-serif",
              color: tk.textPrimary,
              outline: 'none',
            }}
          />
          <div style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)' }}>
            <Spinner size={18} color={tk.accent} strokeWidth={2} />
          </div>
        </div>
        <span style={{ fontSize: 12, color: tk.textTertiary, fontFamily: "'Inter', sans-serif" }}>
          Checking…
        </span>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 3 — BUTTON LOADING STATE
═══════════════════════════════════════ */
function P03_ButtonLoading({ mode }) {
  return (
    <PatternCard mode={mode} minHeight={140}>
      <div style={{ width: '100%', maxWidth: 342 }}>
        <PrimaryBtn mode={mode} loading={true}>Send verification code</PrimaryBtn>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 4 — BUTTON DISABLED STATE
═══════════════════════════════════════ */
function P04_ButtonDisabled({ mode }) {
  const tk = T[mode];
  return (
    <PatternCard mode={mode} minHeight={200}>
      <div style={{ width: '100%', maxWidth: 342, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <PrimaryBtn mode={mode} disabled={false}>Enabled</PrimaryBtn>
        <PrimaryBtn mode={mode} disabled={true}>Disabled</PrimaryBtn>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 5 — TOAST / SNACKBAR
═══════════════════════════════════════ */
function Toast({ mode, variant, message, action }) {
  const tk = T[mode];
  const configs = {
    success: { color: tk.verified,  bg: tk.verifiedTint, border: tk.verified  },
    error:   { color: tk.warning,   bg: tk.warningTint,  border: tk.warning   },
    info:    { color: tk.accent,    bg: tk.infoTint,     border: tk.accent    },
  };
  const cfg = configs[variant];

  const IconShape = () => {
    if (variant === 'success') return (
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="9" fill={cfg.color} fillOpacity="0.15" />
        <polyline points="5.5,9.5 7.8,11.8 12.5,6.5" stroke={cfg.color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none" />
      </svg>
    );
    if (variant === 'error') return <WarnIcon size={18} color={cfg.color} />;
    return (
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="8.5" stroke={cfg.color} strokeWidth="1.2" />
        <path d="M9 8v4.5" stroke={cfg.color} strokeWidth="1.4" strokeLinecap="round" />
        <circle cx="9" cy="6" r="0.8" fill={cfg.color} />
      </svg>
    );
  };

  return (
    <div style={{
      width: '100%',
      height: 56,
      background: tk.surface,
      border: `1px solid ${cfg.border}22`,
      borderLeft: `3px solid ${cfg.color}`,
      borderRadius: 12,
      display: 'flex',
      alignItems: 'center',
      gap: 10,
      padding: '0 16px',
      boxShadow: `0 4px 16px rgba(0,0,0,0.10)`,
    }}>
      <IconShape />
      <span style={{
        flex: 1,
        fontSize: 14,
        fontFamily: "'Inter', sans-serif",
        color: tk.textPrimary,
        fontWeight: 400,
        lineHeight: 1.4,
      }}>{message}</span>
      {action && (
        <button style={{
          background: 'none', border: 'none',
          color: cfg.color,
          fontSize: 13,
          fontFamily: "'Inter', sans-serif",
          fontWeight: 500,
          cursor: 'pointer',
          padding: '0 4px',
          flexShrink: 0,
        }}>{action}</button>
      )}
    </div>
  );
}

function P05_Toasts({ mode }) {
  return (
    <PatternCard mode={mode} minHeight={260}>
      <div style={{ width: '100%', maxWidth: 342, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <Toast mode={mode} variant="success" message="Verification complete. Welcome to Burrow." />
        <Toast mode={mode} variant="error" message="Couldn't send the code. Check your connection." action="Retry" />
        <Toast mode={mode} variant="info" message="Your listing was saved as a draft." action="View" />
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 6 — EMPTY STATE
═══════════════════════════════════════ */
function P06_EmptyState({ mode }) {
  const tk = T[mode];
  return (
    <PatternCard mode={mode} minHeight={380}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20, maxWidth: 280 }}>
        {/* Line art illustration */}
        <svg width="120" height="88" viewBox="0 0 120 88" fill="none">
          <rect x="16" y="28" width="88" height="52" rx="4" stroke={tk.border} strokeWidth="1.4" />
          <rect x="28" y="40" width="24" height="18" rx="2" stroke={tk.border} strokeWidth="1.2" />
          <path d="M62 44h28M62 52h20M62 60h14" stroke={tk.border} strokeWidth="1.2" strokeLinecap="round" />
          <circle cx="60" cy="18" r="10" stroke={tk.accent} strokeWidth="1.4" strokeOpacity="0.6" />
          <path d="M56 18h8M60 14v8" stroke={tk.accent} strokeWidth="1.4" strokeLinecap="round" strokeOpacity="0.4" />
          <path d="M68 25l8 8" stroke={tk.accent} strokeWidth="1.5" strokeLinecap="round" strokeOpacity="0.5" />
          <path d="M16 28 Q60 8 104 28" stroke={tk.accent} strokeWidth="1" strokeLinecap="round" fill="none" strokeOpacity="0.18" />
        </svg>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center', textAlign: 'center' }}>
          <FHead mode={mode} size={22}>No flatmates match these filters</FHead>
          <p style={{ fontSize: 14, color: tk.textSecondary, fontFamily: "'Inter', sans-serif", lineHeight: 1.6 }}>
            Try widening your locality or adjusting your budget range.
          </p>
        </div>
        <div style={{ width: '100%', marginTop: 4 }}>
          <PrimaryBtn mode={mode}>Adjust filters</PrimaryBtn>
        </div>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 7 — ERROR STATE
═══════════════════════════════════════ */
function P07_ErrorState({ mode }) {
  const tk = T[mode];
  return (
    <PatternCard mode={mode} minHeight={380}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20, maxWidth: 280 }}>
        <svg width="88" height="88" viewBox="0 0 88 88" fill="none">
          <circle cx="44" cy="44" r="32" stroke={tk.warning} strokeWidth="1.4" strokeOpacity="0.3" />
          <circle cx="44" cy="44" r="22" stroke={tk.warning} strokeWidth="1.2" strokeOpacity="0.2" />
          <path d="M44 30v16" stroke={tk.warning} strokeWidth="2" strokeLinecap="round" />
          <circle cx="44" cy="54" r="1.5" fill={tk.warning} />
          <path d="M24 68 Q44 56 64 68" stroke={tk.warning} strokeWidth="1" strokeLinecap="round" fill="none" strokeOpacity="0.25" />
        </svg>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center', textAlign: 'center' }}>
          <FHead mode={mode} size={22}>Something went wrong</FHead>
          <p style={{ fontSize: 14, color: tk.textSecondary, fontFamily: "'Inter', sans-serif", lineHeight: 1.6 }}>
            Check your connection and try again.
          </p>
        </div>
        <div style={{ width: '100%', marginTop: 4 }}>
          <PrimaryBtn mode={mode}>Try again</PrimaryBtn>
        </div>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 8 — SKELETON LOADER
═══════════════════════════════════════ */
function SkeletonBlock({ mode, width = '100%', height, radius = 6 }) {
  const tk = T[mode];
  return (
    <div style={{
      width,
      height,
      borderRadius: radius,
      background: `linear-gradient(90deg, ${tk.skeletonBase} 25%, ${tk.skeletonShine} 50%, ${tk.skeletonBase} 75%)`,
      backgroundSize: '800px 100%',
      animation: 'burrow-shimmer 1.4s infinite linear',
    }} />
  );
}

function SkeletonCard({ mode }) {
  const tk = T[mode];
  return (
    <div style={{
      background: tk.surface,
      border: `1px solid ${tk.border}`,
      borderRadius: 12,
      padding: 16,
      display: 'flex',
      gap: 14,
      alignItems: 'flex-start',
    }}>
      <SkeletonBlock mode={mode} width={52} height={52} radius={26} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8, paddingTop: 2 }}>
        <SkeletonBlock mode={mode} width="65%" height={14} />
        <SkeletonBlock mode={mode} width="40%" height={11} />
        <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
          <SkeletonBlock mode={mode} width={72} height={24} radius={100} />
          <SkeletonBlock mode={mode} width={60} height={24} radius={100} />
        </div>
      </div>
    </div>
  );
}

function P08_Skeleton({ mode }) {
  return (
    <PatternCard mode={mode} minHeight={360}>
      <div style={{ width: '100%', maxWidth: 342, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <SkeletonCard mode={mode} />
        <SkeletonCard mode={mode} />
        <SkeletonCard mode={mode} />
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 9 — CONFIRMATION MODAL
═══════════════════════════════════════ */
function P09_ConfirmModal({ mode }) {
  const tk = T[mode];
  return (
    <PatternCard mode={mode} minHeight={320} style={{ background: 'rgba(0,0,0,0.25)' }}>
      <div style={{
        width: 320,
        background: tk.surface,
        borderRadius: 16,
        padding: 24,
        display: 'flex',
        flexDirection: 'column',
        gap: 16,
        boxShadow: '0 8px 40px rgba(0,0,0,0.18)',
      }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <FHead mode={mode} size={18}>Block this person?</FHead>
          <p style={{ fontSize: 14, color: tk.textSecondary, fontFamily: "'Inter', sans-serif", lineHeight: 1.6 }}>
            They won't be able to see your profile or message you. You can unblock anytime from settings.
          </p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <PrimaryBtn mode={mode} color={tk.warning}>Block</PrimaryBtn>
          <SecondaryBtn mode={mode}>Cancel</SecondaryBtn>
        </div>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 10 — BOTTOM SHEET
═══════════════════════════════════════ */
function P10_BottomSheet({ mode }) {
  const tk = T[mode];
  const localities = ['Cyber City', 'Golf Course Road', 'Sohna Road', 'DLF Phase 1', 'DLF Phase 5', 'Sector 44', 'Sector 48'];
  const [selected, setSelected] = React.useState(new Set(['Cyber City', 'Golf Course Road']));

  const toggle = loc => {
    const s = new Set(selected);
    s.has(loc) ? s.delete(loc) : s.add(loc);
    setSelected(s);
  };

  return (
    <PatternCard mode={mode} minHeight={560} style={{ background: 'rgba(0,0,0,0.25)', justifyContent: 'flex-end', padding: 0 }}>
      <div style={{
        width: '100%',
        background: tk.surface,
        borderRadius: '20px 20px 0 0',
        overflow: 'hidden',
      }}>
        {/* Handle */}
        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12, paddingBottom: 4 }}>
          <div style={{ width: 40, height: 4, borderRadius: 2, background: tk.border }} />
        </div>
        {/* Header */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '12px 20px 16px',
          borderBottom: `1px solid ${tk.border}`,
        }}>
          <FHead mode={mode} size={18}>Locality</FHead>
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
            <CloseIcon size={18} color={tk.textTertiary} />
          </button>
        </div>
        {/* Items */}
        <div style={{ padding: '8px 20px 0' }}>
          {localities.map(loc => {
            const on = selected.has(loc);
            return (
              <div
                key={loc}
                onClick={() => toggle(loc)}
                style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: '14px 0',
                  borderBottom: `1px solid ${tk.border}`,
                  cursor: 'pointer',
                }}
              >
                <span style={{ fontSize: 15, color: tk.textPrimary, fontFamily: "'Inter', sans-serif" }}>{loc}</span>
                <div style={{
                  width: 20, height: 20, borderRadius: 4,
                  border: `${on ? 0 : 1}px solid ${on ? 'transparent' : tk.border}`,
                  background: on ? tk.accent : 'transparent',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  {on && (
                    <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                      <polyline points="2,5.5 4.5,8 9,3" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none" />
                    </svg>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        {/* Apply */}
        <div style={{ padding: '16px 20px 28px' }}>
          <PrimaryBtn mode={mode}>Apply ({selected.size} selected)</PrimaryBtn>
        </div>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 11 — SUCCESS SCREEN
═══════════════════════════════════════ */
function P11_Success({ mode }) {
  const tk = T[mode];
  return (
    <PatternCard mode={mode} minHeight={400}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20, maxWidth: 280 }}>
        <CheckIcon size={64} color={tk.verified} />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center', textAlign: 'center' }}>
          <FHead mode={mode} size={24}>Report submitted</FHead>
          <p style={{ fontSize: 14, color: tk.textSecondary, fontFamily: "'Inter', sans-serif", lineHeight: 1.6 }}>
            We'll review within 24 hours. You won't see them again.
          </p>
        </div>
        <div style={{ width: '100%', marginTop: 4 }}>
          <PrimaryBtn mode={mode}>Done</PrimaryBtn>
        </div>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN 12 — PERMISSION PROMPT
═══════════════════════════════════════ */
function P12_Permission({ mode }) {
  const tk = T[mode];
  return (
    <PatternCard mode={mode} minHeight={320}>
      <div style={{
        width: '100%',
        maxWidth: 342,
        background: tk.surface,
        border: `1px solid ${tk.border}`,
        borderRadius: 16,
        padding: 24,
        display: 'flex',
        flexDirection: 'column',
        gap: 16,
      }}>
        {/* Location pin icon */}
        <div style={{ display: 'flex', justifyContent: 'center' }}>
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="20" fill={tk.accentTint} />
            <circle cx="20" cy="17" r="5" stroke={tk.accent} strokeWidth="1.5" />
            <path d="M20 22 Q14 28 20 34 Q26 28 20 22" stroke={tk.accent} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </svg>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, textAlign: 'center' }}>
          <FHead mode={mode} size={18}>Find flats near you</FHead>
          <p style={{ fontSize: 14, color: tk.textSecondary, fontFamily: "'Inter', sans-serif", lineHeight: 1.6 }}>
            Burrow uses your location to show listings in your area. We don't store it.
          </p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <PrimaryBtn mode={mode}>Allow</PrimaryBtn>
          <button style={{
            background: 'none', border: 'none',
            color: tk.accent,
            fontSize: 14,
            fontFamily: "'Inter', sans-serif",
            cursor: 'pointer',
            padding: '8px 0',
          }}>Not now</button>
        </div>
      </div>
    </PatternCard>
  );
}

/* ═══════════════════════════════════════
   PATTERN DEFINITIONS
═══════════════════════════════════════ */
const PATTERNS = [
  { id: 'p01', label: '01 — Input: validation error',   Component: P01_InputError,   height: 200 },
  { id: 'p02', label: '02 — Input: inline loading',     Component: P02_InputLoading, height: 200 },
  { id: 'p03', label: '03 — Button: loading state',     Component: P03_ButtonLoading,height: 160 },
  { id: 'p04', label: '04 — Button: disabled state',    Component: P04_ButtonDisabled,height: 220 },
  { id: 'p05', label: '05 — Toast / snackbar',          Component: P05_Toasts,       height: 280 },
  { id: 'p06', label: '06 — Empty state',               Component: P06_EmptyState,   height: 420 },
  { id: 'p07', label: '07 — Error state',               Component: P07_ErrorState,   height: 420 },
  { id: 'p08', label: '08 — Skeleton loader',           Component: P08_Skeleton,     height: 380 },
  { id: 'p09', label: '09 — Confirmation modal',        Component: P09_ConfirmModal, height: 360 },
  { id: 'p10', label: '10 — Bottom sheet',              Component: P10_BottomSheet,  height: 580 },
  { id: 'p11', label: '11 — Success screen',            Component: P11_Success,      height: 420 },
  { id: 'p12', label: '12 — Permission prompt',         Component: P12_Permission,   height: 360 },
];

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
function App() {
  return (
    <DesignCanvas>
      {PATTERNS.map(({ id, label, Component, height }) => (
        <DCSection key={id} id={id} title={label}>
          <DCArtboard id={`${id}-light`} label="Light mode" width={390} height={height}>
            <Component mode="light" />
          </DCArtboard>
          <DCArtboard id={`${id}-dark`} label="Dark mode" width={390} height={height}>
            <Component mode="dark" />
          </DCArtboard>
        </DCSection>
      ))}
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
